name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup game folder
      run: |
        mkdir -p "$HOME/stardew"
        
        # Stardew Valley.dll - Google Drive'dan indir
        FILE_ID="12tXWHUfUPeOtW-gaL2HepY_44SWTAjWN"
        curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t" -o "$HOME/stardew/Stardew Valley.dll"
        
        # Diğer DLL'leri base64 txt'den çevir
        base64 -d StardewModdingAPI.txt > "$HOME/stardew/StardewModdingAPI.dll"
        base64 -d MonoGame.Framework.txt > "$HOME/stardew/MonoGame.Framework.dll"
        base64 -d xTile.txt > "$HOME/stardew/xTile.dll"
        
        # Kontrol
        ls -la "$HOME/stardew/"

    - name: Build StubLibs
      run: |
        dotnet build StubLibs/StubLibs.csproj --configuration Release
        dotnet build StubLibs/SMAPIStub.csproj --configuration Release

    - name: Build ValleyTalk
      run: |
        dotnet build src/ValleyTalk.csproj --configuration Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net6.0/
