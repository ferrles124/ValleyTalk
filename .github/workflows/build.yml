name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup game stubs
      run: |
        mkdir -p ~/stardew
        wget -q https://github.com/Pathoschild/SMAPI/releases/download/4.1.10/SMAPI-4.1.10-installer.zip
        unzip -q SMAPI-4.1.10-installer.zip -d smapi
        find smapi -name "*.dll" | head -5
        ls smapi/

    - name: Extract game DLLs from SMAPI
      run: |
        mkdir -p ~/stardew
        # SMAPI linux klasöründen DLL'leri kopyala
        find smapi -name "StardewValley.dll" -o -name "MonoGame.Framework.dll" -o -name "xTile.dll" 2>/dev/null | xargs -I{} cp {} ~/stardew/ || true
        ls ~/stardew/

    - name: Build
      run: |
        dotnet build src/ValleyTalk.csproj \
          --configuration Release \
          /p:GamePath="$HOME/stardew" \
          /p:CopyModReferencesToBuildOutput=true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net6.0/
