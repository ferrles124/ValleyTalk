name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup game folder
      run: |
        mkdir -p "$HOME/stardew"
        
        FILE_ID="12tXWHUfUPeOtW-gaL2HepY_44SWTAjWN"
        curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}&confirm=t" -o "$HOME/stardew/Stardew Valley.dll"
        
        FILE_ID2="1mdSKSSeWkdeQXtRJNp7944kM93jv-mIp"
        curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID2}&confirm=t" -o "$HOME/stardew/StardewValley.GameData.dll"
        
        wget -q https://github.com/Pathoschild/SMAPI/releases/download/4.1.10/SMAPI-4.1.10-installer.zip
        unzip -q SMAPI-4.1.10-installer.zip -d smapi
        echo "=== SMAPI zip içindeki DLL'ler ==="
        find smapi -name "*.dll" | sort
        find smapi -name "StardewModdingAPI.dll" -exec cp {} "$HOME/stardew/" \; 2>/dev/null || true
        echo "SMAPI sonuç: $(ls -la $HOME/stardew/StardewModdingAPI.dll 2>/dev/null || echo 'YOK')"
        
        base64 -d MonoGame.Framework.txt > "$HOME/stardew/MonoGame.Framework.dll"
        base64 -d xTile.txt > "$HOME/stardew/xTile.dll"
        
        ls -la "$HOME/stardew/"

    - name: Build ValleyTalk
      run: |
        dotnet build src/ValleyTalk.csproj --configuration Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net8.0/
