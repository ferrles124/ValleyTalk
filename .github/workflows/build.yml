name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Build StubLibs
      run: dotnet build StubLibs/StubLibs.csproj --configuration Release

    - name: Build SMAPIStub
      run: dotnet build StubLibs/SMAPIStub.csproj --configuration Release

    - name: Setup fake game folder
      run: |
        mkdir -p "$HOME/stardew"
        cp "StubLibs/bin/Release/net6.0/Stardew Valley.dll" "$HOME/stardew/"
        cp "StubLibs/bin/Release/net6.0/StardewModdingAPI.dll" "$HOME/stardew/"
        touch "$HOME/stardew/MonoGame.Framework.dll"
        touch "$HOME/stardew/xTile.dll"

    - name: Build ValleyTalk
      run: |
        dotnet build src/ValleyTalk.csproj \
          --configuration Release \
          /p:GAME_PATH="$HOME/stardew"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net6.0/
