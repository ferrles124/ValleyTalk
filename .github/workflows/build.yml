name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Setup fake game folder
      run: |
        mkdir -p "$HOME/stardew"
        echo "" > "$HOME/stardew/StardewValley"
        chmod +x "$HOME/stardew/StardewValley"
        wget -q https://github.com/Pathoschild/SMAPI/releases/download/4.1.10/SMAPI-4.1.10-installer.zip
        unzip -q SMAPI-4.1.10-installer.zip -d smapi
        cp "smapi/SMAPI 4.1.10 installer/internal/linux/"*.dll "$HOME/stardew/" 2>/dev/null || true

    - name: Build
      run: |
        dotnet build src/ValleyTalk.csproj \
          --configuration Release \
          /p:GAME_PATH="$HOME/stardew"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net6.0/
