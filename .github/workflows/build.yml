name: Build ValleyTalk

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Build StubLibs
      run: |
        dotnet build StubLibs/StubLibs.csproj --configuration Release
        dotnet build StubLibs/SMAPIStub.csproj --configuration Release

    - name: Build ValleyTalk
      run: |
        dotnet build src/ValleyTalk.csproj --configuration Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ValleyTalk
        path: src/bin/Release/net6.0/
